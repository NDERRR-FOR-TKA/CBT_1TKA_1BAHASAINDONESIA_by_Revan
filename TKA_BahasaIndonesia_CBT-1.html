<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT TKA Bahasa Indonesia SMP</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0d1b3e; --navy2:#162552; --emerald:#059669; --emerald2:#10b981;
    --amber:#d97706; --amber2:#f59e0b; --red:#ef4444; --blue:#2563eb;
    --bg:#f0fdf4; --card:#fff; --text:#1e293b; --muted:#64748b;
    --border:#e2e8f0; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* HEADER */
  .header{background:linear-gradient(135deg,#064e3b 0%,#065f46 60%,#047857 100%);color:white;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(6,78,59,.4);}
  .header-inner{max-width:960px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .header-badge{background:var(--amber2);color:#1a1a1a;font-weight:800;font-size:11px;padding:3px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;}
  .header h1{font-size:16px;font-weight:700;flex:1;}
  .header h1 span{color:var(--amber2);}
  #timer{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;background:rgba(255,255,255,.12);padding:6px 14px;border-radius:8px;color:#fff;letter-spacing:1px;border:1px solid rgba(255,255,255,.2);transition:background .3s;}
  #timer.urgent{background:rgba(239,68,68,.4);animation:pulse .8s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

  .progress-wrap{background:#064e3b;padding:0 20px 10px;}
  .progress-inner{max-width:960px;margin:0 auto;}
  .progress-info{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:5px;}
  .progress-bar{height:5px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber2));border-radius:99px;transition:width .4s ease;}

  /* MAIN */
  .main{max-width:960px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:1fr;gap:20px;}

  /* NAVIGATOR */
  .nav-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
  .nav-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
  .nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:5px;}
  .nav-btn{aspect-ratio:1;border:2px solid var(--border);background:white;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;color:var(--muted);display:flex;align-items:center;justify-content:center;}
  .nav-btn:hover{border-color:var(--emerald2);color:var(--emerald);}
  .nav-btn.answered{background:var(--navy);border-color:var(--navy);color:white;}
  .nav-btn.active{background:var(--emerald);border-color:var(--emerald);color:white;transform:scale(1.12);}
  .nav-btn.pgk{border-style:dashed;}
  .nav-btn.bs-type{border-radius:50%;}
  .legend{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
  .legend-dot{width:12px;height:12px;border-radius:3px;border:2px solid;}

  /* SOAL CARD */
  .soal-card{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:0 2px 16px rgba(0,0,0,.07);animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .soal-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .soal-num{background:var(--navy);color:white;font-size:13px;font-weight:800;padding:4px 14px;border-radius:8px;}
  .tipe-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
  .tipe-pg{background:#dbeafe;color:#1d4ed8;}
  .tipe-pgk{background:#fef3c7;color:#b45309;}
  .tipe-bs{background:#d1fae5;color:#065f46;}
  .tipe-ss{background:#ede9fe;color:#5b21b6;}

  /* TEKS BACAAN */
  .teks-box{background:#f8fff8;border:1px solid #bbf7d0;border-radius:10px;padding:16px 18px;margin-bottom:16px;font-size:13.5px;line-height:1.8;color:var(--text);}
  .teks-title{font-weight:800;font-size:14px;color:var(--navy);margin-bottom:8px;text-align:center;}
  .teks-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px;}
  .teks-label{font-size:10px;font-weight:700;color:var(--emerald);letter-spacing:.5px;text-transform:uppercase;background:#dcfce7;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;}

  .instruksi{font-size:12.5px;color:#dc2626;font-weight:600;font-style:italic;margin-bottom:12px;padding:6px 12px;background:#fff1f2;border-radius:6px;border:1px solid #fecdd3;}
  .pertanyaan{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.6;}

  /* OPTIONS */
  .options{display:flex;flex-direction:column;gap:9px;}
  .option-btn{display:flex;align-items:flex-start;gap:12px;padding:11px 15px;border:2px solid var(--border);border-radius:10px;background:white;cursor:pointer;font-family:inherit;font-size:13.5px;text-align:left;transition:all .18s;color:var(--text);line-height:1.5;}
  .option-btn:hover:not(.disabled){border-color:var(--emerald2);background:#f0fdf4;}
  .opt-label{min-width:28px;height:28px;background:var(--bg);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--navy);flex-shrink:0;}
  .option-btn.selected{border-color:var(--emerald);background:#f0fdf4;}
  .option-btn.selected .opt-label{background:var(--emerald);color:white;}
  .option-btn.correct{border-color:var(--emerald2);background:#dcfce7;}
  .option-btn.correct .opt-label{background:var(--emerald2);color:white;}
  .option-btn.wrong{border-color:var(--red);background:#fee2e2;}
  .option-btn.wrong .opt-label{background:var(--red);color:white;}
  .option-btn.disabled{cursor:default;}
  .option-btn.pgk-opt.selected .opt-label{background:var(--amber2);border-color:var(--amber2);color:#1a1a1a;}

  /* BS TABLE */
  .bs-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;}
  .bs-table th{background:var(--navy);color:white;padding:9px 12px;font-size:11.5px;text-align:left;}
  .bs-table th:last-child,.bs-table th:nth-last-child(2){text-align:center;width:80px;}
  .bs-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .bs-table tr:nth-child(even) td{background:#f8fff8;}
  .bs-label{width:32px;font-weight:700;color:var(--navy);}
  .bs-radio{display:flex;align-items:center;justify-content:center;}
  .bs-radio input[type=radio]{display:none;}
  .bs-radio label{width:30px;height:30px;border:2px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .18s;background:white;}
  .bs-radio label:hover{border-color:var(--emerald);}
  .bs-radio.benar input:checked+label{border-color:var(--emerald);background:var(--emerald);color:white;}
  .bs-radio.salah input:checked+label{border-color:var(--red);background:var(--red);color:white;}
  .bs-radio.setuju input:checked+label{border-color:var(--blue);background:var(--blue);color:white;}
  .bs-radio.tidak input:checked+label{border-color:var(--amber);background:var(--amber);color:white;}

  /* PEMBAHASAN */
  .pembahasan{margin-top:18px;border-top:2px dashed var(--border);padding-top:16px;display:none;animation:fadeIn .3s ease;}
  .pembahasan.show{display:block;}
  .pemb-header{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
  .rumus-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;color:#065f46;margin-bottom:10px;}
  .step{font-size:13px;color:var(--text);margin-bottom:5px;padding-left:18px;position:relative;line-height:1.6;}
  .step::before{content:"→";position:absolute;left:0;color:var(--emerald);font-weight:700;}
  .jawaban-final{margin-top:10px;padding:10px 14px;background:#dcfce7;border-radius:8px;font-weight:700;font-size:13.5px;color:#065f46;border:1px solid #86efac;}
  .bs-pemb-row{border-bottom:1px solid var(--border);padding:7px 0;font-size:13px;}
  .bs-pemb-label{font-weight:700;color:var(--navy);margin-right:6px;}
  .bs-pemb-jawaban{display:inline-block;padding:1px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-right:6px;}
  .bs-pemb-jawaban.benar,.bs-pemb-jawaban.setuju{background:#dcfce7;color:#065f46;}
  .bs-pemb-jawaban.salah,.bs-pemb-jawaban.tidak{background:#fee2e2;color:#991b1b;}

  /* ACTIONS */
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
  .btn{padding:11px 22px;border-radius:10px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:7px;}
  .btn-primary{background:var(--emerald);color:white;}
  .btn-primary:hover{background:#047857;transform:translateY(-1px);}
  .btn-outline{background:white;color:var(--navy);border:2px solid var(--border);}
  .btn-outline:hover{border-color:var(--emerald);color:var(--emerald);}
  .btn-accent{background:var(--amber2);color:#1a1a1a;}
  .btn-accent:hover{background:var(--amber);}
  .btn:disabled{opacity:.4;cursor:default;transform:none!important;}

  /* RESULT */
  #result-screen{display:none;background:var(--card);border-radius:var(--radius);padding:40px 28px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);animation:fadeIn .4s ease;}
  .result-emoji{font-size:64px;margin-bottom:12px;}
  .result-title{font-size:28px;font-weight:800;color:var(--navy);margin-bottom:6px;}
  .result-sub{font-size:15px;color:var(--muted);margin-bottom:28px;}
  .score-big{font-size:72px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--emerald);line-height:1;margin-bottom:8px;}
  .score-label{font-size:13px;color:var(--muted);margin-bottom:28px;}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
  .stat-box{padding:16px 10px;border-radius:12px;border:2px solid var(--border);}
  .stat-box.correct-box{border-color:var(--emerald2);background:#dcfce7;}
  .stat-box.wrong-box{border-color:var(--red);background:#fee2e2;}
  .stat-box.skip-box{border-color:var(--border);background:#f8faff;}
  .stat-num{font-size:28px;font-weight:800;}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .correct-box .stat-num{color:var(--emerald);}
  .wrong-box .stat-num{color:var(--red);}
  .predikat{display:inline-block;padding:6px 20px;border-radius:20px;font-weight:700;font-size:14px;margin-bottom:24px;}

  /* REVIEW */
  #review-section{display:none;margin-top:24px;}
  .review-item{background:var(--card);border-radius:12px;padding:20px;margin-bottom:14px;border-left:4px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.05);}
  .review-item.correct{border-left-color:var(--emerald);}
  .review-item.wrong{border-left-color:var(--red);}

  @media(max-width:600px){.soal-card{padding:18px;}.score-big{font-size:52px;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <span class="header-badge">TKA</span>
    <h1>Latihan Soal <span>Bahasa Indonesia SMP</span></h1>
    <div id="timer">75:00</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-inner">
      <div class="progress-info">
        <span id="progress-text">Soal 1 dari 30</span>
        <span id="answered-count">0 dijawab</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:3.3%"></div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="nav-card">
    <div class="nav-title">Navigator Soal</div>
    <div class="nav-grid" id="nav-grid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#0d1b3e;border-color:#0d1b3e"></div>Dijawab</div>
      <div class="legend-item"><div class="legend-dot" style="background:#059669;border-color:#059669"></div>Aktif</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#94a3b8;border-style:dashed"></div>PG Kompleks</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#94a3b8;border-radius:50%"></div>Benar/Salah</div>
    </div>
  </div>

  <div id="soal-area">
    <div class="soal-card" id="soal-card"></div>
    <div class="actions" id="actions"></div>
  </div>

  <div id="result-screen"></div>
  <div id="review-section"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// TEKS BACAAN
// ═══════════════════════════════════════════════════════
const teksData = {
  teks1: {
    label: "Teks Bacaan untuk Soal No. 1, 2, dan 3",
    title: "Teks Ulasan 1 & 2 – Wisata Alam",
    isi: `<div class="teks-label">Teks Ulasan 1 – Blog Wisata</div>
<b>Pantai Wediombo, Gunung Kidul</b><br>
Pantai Wediombo menyimpan pesona yang jarang diketahui banyak orang. Berbeda dari pantai-pantai populer di Gunung Kidul, pantai ini menawarkan suasana yang tenang dan alami. Kolam alami yang terbentuk di antara batu-batu karang menjadi daya tarik utama. Airnya yang jernih dan tenang menjadi tempat favorit untuk berenang dengan aman, bahkan bagi anak-anak. Hamparan pasir putih membentang luas, dikelilingi tebing-tebing hijau yang megah.<br><br>
Fasilitas di sini cukup memadai. Area parkir luas, warung makan lokal, dan toilet umum tersedia. Jalan menuju pantai sudah beraspal, meskipun berkelok-kelok. Harga tiket masuk sangat terjangkau. Pantai ini cocok dikunjungi pagi hari saat ombak masih tenang. Namun, pengunjung disarankan tidak berenang terlalu jauh dari kolam alami karena ombak laut lepas cukup deras.
<br><br>
<div class="teks-label">Teks Ulasan 2 – Blog Anak Muda</div>
<b>Pantai Siung, Hidden Gem Gunung Kidul!</b><br>
Guys, kalau kalian lagi nyari pantai yang beda dari yang lain, Pantai Siung wajib masuk bucket list! Bukan cuma pantainya yang keren, tapi tebing-tebing karst yang tinggi bikin spot foto super aesthetic. Para pecinta panjat tebing pasti langsung jatuh cinta sama tempat ini karena ada ratusan jalur panjat yang udah terkenal sampai mancanegara.<br><br>
Ombaknya emang agak ganas, jadi kalau mau renang harus hati-hati ya. Tapi buat yang suka foto-foto atau sekadar duduk santai sambil nikmatin pemandangan, surganya banget! Fasilitasnya lumayan, ada warung dan parkiran. Kalau mau dapet foto terbaik, dateng pas golden hour deh. Dijamin feed instagram kalian auto keren!`
  },
  teks2: {
    label: "Teks Bacaan untuk Soal No. 4, 5, dan 6",
    title: "Puisi – Nelayan Tua",
    isi: `<div style="text-align:center;font-style:italic;line-height:2.2;font-size:13.5px">
<b>Nelayan Tua</b><br><br>
Lelaki tua di tepi dermaga<br>
melempar jala ke lautan lebar<br>
tangannya kasar dipahat waktu<br>
namun matanya menyimpan cahaya<br><br>

menantang angin dan gelombang dini hari<br>
membawa ikan untuk anak-anaknya<br>
memikul hidup di atas perahu tua<br><br>

namun karena di darat menanti<br>
istri dan anak-anak yang percaya padanya<br><br>

dalam dan penuh, diam namun bergerak<br>
memberi tanpa meminta<br>
hidup sepenuhnya untuk orang yang dicinta<br><br>
<small>(Puisi karya Ananda Rahayu)</small>
</div>`
  },
  teks3: {
    label: "Teks Bacaan untuk Soal No. 7, 8, dan 9",
    title: "Teks Informatif – Komodo: Kadal Terbesar di Dunia",
    isi: `<b>Mengenal Komodo</b><br>
Komodo (Varanus komodoensis) adalah kadal terbesar yang masih hidup di dunia. Hewan ini hanya dapat ditemukan di beberapa pulau di Indonesia, yaitu Pulau Komodo, Rinca, Flores, Gili Motang, dan Nusa Kode. Komodo termasuk hewan yang dilindungi karena statusnya yang terancam punah.<br><br>
<b>Ciri Fisik yang Unik</b><br>
Komodo jantan dewasa dapat mencapai panjang 3 meter dan berat 70 kilogram. Kulitnya bersisik kasar berwarna abu-abu kecokelatan. Lidahnya yang bercabang berfungsi sebagai alat penciuman yang sangat tajam, mampu mendeteksi bau bangkai sejauh 9,5 kilometer. Giginya yang bergerigi seperti gergaji sangat efektif untuk merobek daging mangsa.<br><br>
<b>Cara Berburu</b><br>
Komodo adalah predator puncak. Ia berburu dengan cara mengintai, lalu menyerang mangsa secara tiba-tiba. Liur komodo mengandung lebih dari 50 jenis bakteri berbahaya. Ketika mangsa tergigit dan berhasil kabur, bakteri dalam luka akan menyebabkan infeksi yang mematikan dalam beberapa hari. Komodo kemudian mengikuti mangsa hingga mati.<br><br>
<b>Ancaman dan Pelestarian</b><br>
Populasi komodo terus menurun akibat perburuan liar dan hilangnya habitat. Taman Nasional Komodo telah ditetapkan sebagai Situs Warisan Dunia UNESCO sejak 1991. Pemerintah Indonesia terus berupaya melindungi spesies langka ini melalui berbagai program konservasi.`
  },
  teks4: {
    label: "Teks Bacaan untuk Soal No. 10, 11, dan 12",
    title: "Teks Prosedur – Membuat Batik Jumputan",
    isi: `<b>Apa itu Batik Jumputan?</b><br>
Batik jumputan adalah teknik membuat motif pada kain dengan cara mengikat bagian-bagian tertentu sebelum dicelupkan ke dalam pewarna. Teknik ini termasuk dalam metode tie-dye yang telah dikenal luas di berbagai negara. Di Indonesia, batik jumputan populer di Solo dan Palembang.<br><br>
<b>Alat dan Bahan:</b><br>
• Kain putih polos (katun)<br>
• Pewarna kain (naptol atau remasol)<br>
• Karet gelang atau tali rafia<br>
• Biji-bijian, kerikil, atau koin (untuk membuat motif)<br>
• Ember dan sarung tangan<br>
• Air panas<br><br>
<b>Langkah Pembuatan:</b><br>
1. Siapkan kain putih dan rendam dalam air bersih selama 15 menit, lalu peras.<br>
2. Letakkan biji-bijian atau koin di atas kain, lalu ikat dengan karet gelang pada bagian tersebut hingga kencang. Bagian yang terikat tidak akan terkena warna.<br>
3. Larutkan pewarna kain dalam air panas sesuai petunjuk. Tambahkan garam atau soda abu untuk hasil warna yang lebih tahan lama.<br>
4. Celupkan kain yang sudah diikat ke dalam larutan pewarna. Diamkan selama 30-60 menit agar warna meresap sempurna.<br>
5. Angkat kain dan bilas dengan air bersih hingga air bilasan tidak berwarna lagi.<br>
6. Buka semua ikatan dengan hati-hati. Motif batik jumputan akan terlihat pada bagian yang sebelumnya terikat.<br>
7. Jemur kain di tempat teduh hingga kering sempurna. Hindari paparan sinar matahari langsung agar warna tidak cepat pudar.<br><br>
<i>Sumber: Kemendikbud, Panduan Kerajinan Tangan Nusantara</i>`
  },
  teks5: {
    label: "Teks Bacaan untuk Soal No. 13, 14, dan 15",
    title: "Teks Fiksi – Surat untuk Ibu",
    isi: `Pagi itu, Hana menemukan sebuah kotak kayu tua di loteng rumah neneknya. Di dalamnya, tersimpan puluhan surat yang terikat dengan pita merah. Hana membuka salah satu surat dengan hati-hati.<br><br>
"Ibu yang kucinta, hari ini aku lulus ujian dengan nilai tertinggi di kelas. Namun, aku tidak bisa tersenyum sempurna karena Ibu tidak ada di sini untuk merayakannya bersamaku. Bapak bilang Ibu sedang merawat nenek di kampung. Aku mengerti, tapi hatiku terasa sepi."<br><br>

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let current = 0;
let answers = new Array(soalData.length).fill(null);
let submitted = false;
let timeLeft = 75 * 60;
let timerInterval;

// ═══════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════
function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s = String(timeLeft%60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
    if(timeLeft <= 300) document.getElementById('timer').classList.add('urgent');
    if(timeLeft <= 0) { clearInterval(timerInterval); submitAll(); }
  }, 1000);
}

// ═══════════════════════════════════════════════════════
// NAVIGATOR
// ═══════════════════════════════════════════════════════
function buildNavigator() {
  const grid = document.getElementById('nav-grid');
  let html = '';
  soalData.forEach((s,i) => {
    const cls = s.tipe==='pgk'?'pgk':s.tipe==='bs'?'bs-type':'';
    html += `<button class="nav-btn ${cls}" id="nav-${i}" onclick="goTo(${i})">${i+1}</button>`;
  });
  grid.innerHTML = html;
}

function updateNavigator() {
  const done = soalData.filter((s,i)=>isAnswered(s,answers[i])).length;
  document.getElementById('progress-text').textContent = `Soal ${current+1} dari ${soalData.length}`;
  document.getElementById('answered-count').textContent = `${done} dijawab`;
  const pct = ((current+1)/soalData.length)*100;
  document.getElementById('progress-fill').style.width = pct+'%';
  soalData.forEach((s,i) => {
    const btn = document.getElementById(`nav-${i}`);
    btn.classList.remove('answered','active');
    if(i===current) btn.classList.add('active');
    else if(isAnswered(s,answers[i])) btn.classList.add('answered');
  });
}

// ═══════════════════════════════════════════════════════
// RENDER SOAL
// ═══════════════════════════════════════════════════════
function goTo(idx) {
  current = idx;
  renderSoal();
  updateNavigator();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderSoal() {
  const s = soalData[current];
  const card = document.getElementById('soal-card');
  const teks = teksData[s.teksKey];
  const tipeBadge = {pg:'🔵 PG Biasa',pgk:'🟡 PG Kompleks',bs:'🟢 Benar/Salah',ss:'🟣 Setuju/Tidak'};
  const tipeClass = {pg:'tipe-pg',pgk:'tipe-pgk',bs:'tipe-bs',ss:'tipe-ss'};

  let html = `<div class="soal-meta">
    <span class="soal-num">No. ${s.no}</span>
    <span class="tipe-badge ${tipeClass[s.tipe]}">${tipeBadge[s.tipe]}</span>
  </div>`;

  // Teks Bacaan
  if(teks) {
    html += `<div class="teks-box">
      <div style="font-size:10px;color:#059669;font-weight:700;margin-bottom:6px">${teks.label}</div>
      ${teks.isi}
    </div>`;
  }

  if(s.instruksi) html += `<div class="instruksi">⚠️ ${s.instruksi}</div>`;
  if(s.tanya) html += `<div class="pertanyaan">${s.tanya.replace(/\n/g,'<br>')}</div>`;

  if(s.tipe==='pg') {
    const labels=['A','B','C','D'];
    html += `<div class="options">`;
    s.opsi.forEach((o,i) => {
      const lbl=labels[i], sel=answers[current]===lbl;
      html += `<button class="option-btn ${sel?'selected':''} ${submitted?'disabled':''}" onclick="selectPG('${lbl}')">
        <span class="opt-label">${lbl}</span><span>${o}</span></button>`;
    });
    html += `</div>`;
  } else if(s.tipe==='pgk') {
    const labels=['A','B','C','D'];
    const curAns=answers[current]||[];
    html += `<div class="options">`;
    s.opsi.forEach((o,i) => {
      const lbl=labels[i], sel=curAns.includes(lbl);
      html += `<button class="option-btn pgk-opt ${sel?'selected':''} ${submitted?'disabled':''}" onclick="selectPGK('${lbl}')">
        <span class="opt-label">${sel?'✓':lbl}</span><span>${o}</span></button>`;
    });
    html += `</div>`;
  } else if(s.tipe==='bs') {
    const curAns=answers[current]||{};
    const col2 = s.pernyataan[0]?.jawaban==='Setuju'?'Setuju':'Benar';
    const col3 = col2==='Setuju'?'Tidak Setuju':'Salah';
    html += `<table class="bs-table"><thead><tr><th>#</th><th>Pernyataan</th><th>${col2}</th><th>${col3}</th></tr></thead><tbody>`;
    s.pernyataan.forEach(p => {
      const v=curAns[p.label]||'';
      const dis=submitted?'disabled':'';
      const r1cls=col2==='Setuju'?'setuju':'benar';
      const r2cls=col3==='Tidak Setuju'?'tidak':'salah';
      html += `<tr><td class="bs-label">${p.label}</td>
        <td>${p.teks}</td>
        <td><div class="bs-radio ${r1cls}"><input type="radio" name="bs-${current}-${p.label}" id="bs-${p.label}-B" value="${col2}" ${v===col2?'checked':''} ${dis} onchange="selectBS('${p.label}','${col2}')"><label for="bs-${p.label}-B">✓</label></div></td>
        <td><div class="bs-radio ${r2cls}"><input type="radio" name="bs-${current}-${p.label}" id="bs-${p.label}-S" value="${col3}" ${v===col3?'checked':''} ${dis} onchange="selectBS('${p.label}','${col3}')"><label for="bs-${p.label}-S">✗</label></div></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  if(submitted) html += renderPembahasan(s);
  card.innerHTML = html;

  const actions = document.getElementById('actions');
  let actHtml = '';
  if(!submitted) {
    actHtml += `<button class="btn btn-outline" onclick="goTo(${Math.max(0,current-1)})" ${current===0?'disabled':''}>← Sebelumnya</button>`;
    actHtml += `<button class="btn btn-primary" onclick="goTo(${Math.min(soalData.length-1,current+1)})" ${current===soalData.length-1?'disabled':''}>Selanjutnya →</button>`;
    actHtml += `<button class="btn btn-accent" onclick="confirmSubmit()" style="margin-left:auto">🏁 Kumpulkan</button>`;
  } else {
    actHtml += `<button class="btn btn-outline" onclick="goTo(${Math.max(0,current-1)})" ${current===0?'disabled':''}>← Sebelumnya</button>`;
    actHtml += `<button class="btn btn-primary" onclick="goTo(${Math.min(soalData.length-1,current+1)})" ${current===soalData.length-1?'disabled':''}>Selanjutnya →</button>`;
  }
  actions.innerHTML = actHtml;
}

function renderPembahasan(s) {
  let html = `<div class="pembahasan show"><div class="pemb-header">💡 Pembahasan</div>`;
  if(s.tipe!=='bs') {
    if(s.pembahasan) s.pembahasan.forEach(l => { html += `<div class="step">${l}</div>`; });
    if(s.jawabanFinal) html += `<div class="jawaban-final">${s.jawabanFinal}</div>`;
  } else {
    s.pernyataan.forEach(p => {
      const jwb = p.jawaban.toLowerCase();
      const cls = (jwb==='benar'||jwb==='setuju') ? 'benar' : 'salah';
      html += `<div class="bs-pemb-row"><span class="bs-pemb-label">${p.label}.</span><span class="bs-pemb-jawaban ${cls}">${p.jawaban.toUpperCase()}</span>${p.pemb}</div>`;
    });
  }
  html += `</div>`;
  return html;
}

// ═══════════════════════════════════════════════════════
// ANSWER SELECTION
// ═══════════════════════════════════════════════════════
function selectPG(lbl) {
  if(submitted) return;
  answers[current] = lbl;
  updateNavigator(); renderSoal();
}
function selectPGK(lbl) {
  if(submitted) return;
  if(!answers[current]) answers[current] = [];
  const arr = answers[current];
  const idx = arr.indexOf(lbl);
  if(idx>-1) arr.splice(idx,1); else arr.push(lbl);
  if(arr.length===0) answers[current]=null;
  updateNavigator(); renderSoal();
}
function selectBS(pLabel, val) {
  if(submitted) return;
  if(!answers[current]) answers[current]={};
  answers[current][pLabel] = val;
  // Cek apakah semua pernyataan sudah dijawab
  const s = soalData[current];
  const allAnswered = s.pernyataan.every(p => answers[current][p.label]);
  if(!allAnswered) answers[current]._complete = false;
  else answers[current]._complete = true;
  updateNavigator();
}

// ═══════════════════════════════════════════════════════
// SUBMIT & SCORE
// ═══════════════════════════════════════════════════════
function confirmSubmit() {
  const done = soalData.filter((s,i)=>isAnswered(s,answers[i])).length;
  const unanswered = soalData.length - done;
  if(unanswered>0 && !confirm(`Masih ada ${unanswered} soal yang belum dijawab.\nYakin ingin mengumpulkan?`)) return;
  submitAll();
}

function isAnswered(s, a) {
  if(!a) return false;
  if(s.tipe==='pg') return typeof a === 'string';
  if(s.tipe==='pgk') return Array.isArray(a) && a.length > 0;
  if(s.tipe==='bs') return s.pernyataan.every(p => a[p.label]);
  return false;
}
function isCorrect(s, a) {
  if(!isAnswered(s,a)) return false;
  if(s.tipe==='pg') return a === s.jawaban;
  if(s.tipe==='pgk') { const sort=arr=>[...arr].sort().join(','); return sort(a)===sort(s.jawaban); }
  if(s.tipe==='bs') return s.pernyataan.every(p => a[p.label] === p.jawaban);
  return false;
}
function calculateScore() {
  let correct=0, skip=0, wrong=0;
  soalData.forEach((s,i) => {
    const a=answers[i];
    if(!isAnswered(s,a)) skip++;
    else if(isCorrect(s,a)) correct++;
    else wrong++;
  });
  return {correct, wrong, skip};
}

function submitAll() {
  clearInterval(timerInterval);
  submitted = true;
  document.getElementById('soal-area').style.display='none';
  document.getElementById('nav-grid').parentElement.style.display='none';

  const {correct,wrong,skip} = calculateScore();
  const score = Math.round((correct/soalData.length)*100);

  let emoji,predikat,pc;
  if(score>=90){emoji='🏆';predikat='Luar Biasa!';pc='#065f46';}
  else if(score>=75){emoji='🌟';predikat='Sangat Bagus!';pc='#1d4ed8';}
  else if(score>=60){emoji='👍';predikat='Cukup Baik';pc='#b45309';}
  else if(score>=40){emoji='📚';predikat='Perlu Belajar Lagi';pc='#dc2626';}
  else{emoji='💪';predikat='Jangan Menyerah!';pc='#7c3aed';}

  const rs = document.getElementById('result-screen');
  rs.style.display='block';
  rs.innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-title">Latihan Selesai!</div>
    <div class="result-sub">TKA Bahasa Indonesia SMP – 30 Soal</div>
    <div class="score-big">${score}</div>
    <div class="score-label">dari 100 poin</div>
    <span class="predikat" style="background:${pc}20;color:${pc};border:2px solid ${pc}40">${predikat}</span>
    <div class="stats-grid">
      <div class="stat-box correct-box"><div class="stat-num">${correct}</div><div class="stat-lbl">✅ Benar</div></div>
      <div class="stat-box wrong-box"><div class="stat-num">${wrong}</div><div class="stat-lbl">❌ Salah</div></div>
      <div class="stat-box skip-box"><div class="stat-num">${skip}</div><div class="stat-lbl">⏭ Dilewati</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="showReview()">📋 Lihat Pembahasan</button>
      <button class="btn btn-accent" onclick="location.reload()">🔄 Coba Lagi</button>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function showReview() {
  const rev = document.getElementById('review-section');
  rev.style.display='block';
  let html=`<h2 style="font-size:18px;font-weight:800;color:var(--navy);margin-bottom:16px">📋 Review Pembahasan Lengkap</h2>`;
  soalData.forEach((s,i) => {
    const a=answers[i];
    let status='skip';
    if(isAnswered(s,a)) status=isCorrect(s,a)?'correct':'wrong';
    const tipeBadge={pg:'PG Biasa',pgk:'PG Kompleks',bs:'Benar/Salah'};
    html+=`<div class="review-item ${status}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="soal-num">No. ${s.no}</span>
        <span class="tipe-badge tipe-${s.tipe}" style="font-size:10px">${tipeBadge[s.tipe]}</span>
        <span style="margin-left:auto;font-size:12px;font-weight:700;color:${status==='correct'?'var(--emerald)':status==='wrong'?'var(--red)':'var(--muted)'}">
          ${status==='correct'?'✅ Benar':status==='wrong'?'❌ Salah':'⏭ Dilewati'}</span>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px">${s.tanya?s.tanya.replace(/\n/g,'<br>'):''}</div>
      ${renderPembahasan(s)}
    </div>`;
  });
  rev.innerHTML=html;
  rev.scrollIntoView({behavior:'smooth'});
}

startTimer();
</script>
